        ctx.save();
        ctx.lineWidth = 1.5;

            ctx.strokeStyle = '#333333';
            ctx.fillStyle = '#f5f5f5';
            ctx.beginPath();
            ctx.roundRect(x - 10, y - 10, 20, 20, 4);
            ctx.fill();
            ctx.stroke();
        } else if (type === 'blue') {
            ctx.strokeStyle = '#4a5568';
            ctx.fillStyle = '#dce6f1';
            ctx.beginPath();
            ctx.roundRect(x - 10, y - 10, 20, 20, 4);
            ctx.fill();
            ctx.stroke();
        } else if (type === 'green') {
            ctx.strokeStyle = '#2f855a';
            ctx.fillStyle = '#e6f4ea';
            ctx.beginPath();
            ctx.roundRect(x - 10, y - 10, 20, 20, 4);
            ctx.fill();
            ctx.stroke();
            if (label) {
                ctx.fillStyle = '#2f855a';
                ctx.font = fontMain;
                ctx.fillText(label, x - 4, y + 4);
            }
        } else if (type === 'evicted') {
            ctx.strokeStyle = '#ed8936';
            ctx.fillStyle = '#fffaf0';
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.roundRect(x - 10, y - 10, 20, 20, 4);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#ed8936';
            ctx.font = "12px sans-serif";
            ctx.fillText("X", x - 4, y + 4);
        }
        ctx.restore();
    }
    function drawText(text, x, y, align = "left", color = "#000000", isMultiline = false) {
        ctx.save();
        ctx.font = fontMain;
        ctx.fillStyle = color;
        ctx.textAlign = align;
        if (isMultiline && Array.isArray(text)) {
            text.forEach((line, index) => {
                ctx.fillText(line, x, y + (index * 16));
            });
        } else {
            ctx.fillText(text, x, y);
        }
        ctx.restore();
    }
    function drawLine(x1, y1, x2, y2, isDash = false, color = "#333333") {
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.2;
        if (isDash) {
            ctx.setLineDash([4, 4]);
        }
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        ctx.restore();
    }
