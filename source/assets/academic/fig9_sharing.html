    <script>
        // Toggle side-by-side comparison panel
        const btnCompare = document.getElementById('btn-compare');
        const referencePanel = document.getElementById('reference-panel');

        btnCompare.addEventListener('click', () => {
            referencePanel.classList.toggle('hidden');
            if (referencePanel.classList.contains('hidden')) {
                btnCompare.innerHTML = '<span>🔍 对照原图</span>';
                btnCompare.classList.replace('bg-amber-100', 'bg-slate-800');
                btnCompare.classList.replace('text-amber-800', 'text-slate-300');
            } else {
                btnCompare.innerHTML = '<span>⚡ 关闭对照</span>';
                btnCompare.classList.replace('bg-slate-800', 'bg-amber-100');
                btnCompare.classList.replace('text-slate-300', 'text-amber-800');
            }
        });

        // Download raw vector SVG
        document.getElementById('btn-svg').addEventListener('click', () => {
            const svgEl = document.getElementById('diagram-svg');
            const svgString = new XMLSerializer().serializeToString(svgEl);
            const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);

            const link = document.createElement('a');
            link.href = url;
            link.download = 'LLM_Prompting_Paradigms_Restoration.svg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        // Render clean, ultra-crisp PNG for thesis/presentations (at 3x density)
        document.getElementById('btn-png').addEventListener('click', () => {
            const svgEl = document.getElementById('diagram-svg');
            const svgString = new XMLSerializer().serializeToString(svgEl);
            const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);

            const image = new Image();
            image.onload = () => {
                const canvas = document.createElement('canvas');
                const scale = 3; // 3x multiplier to ensure academic publication-quality fonts
                canvas.width = 1440 * scale;
                canvas.height = 580 * scale;

                const context = canvas.getContext('2d');
                context.fillStyle = '#FFFFFF';
                context.fillRect(0, 0, canvas.width, canvas.height);
                context.scale(scale, scale);
                context.drawImage(image, 0, 0);

                const pngUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = pngUrl;
                link.download = 'LLM_Prompting_Paradigms_Restoration.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };
            image.src = url;
        });
    </script>
